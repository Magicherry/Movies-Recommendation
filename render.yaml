services:
  - type: web
    name: streamx-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash backend/start_render.sh
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: STREAMX_DATA_DIR
        value: /var/data/streamx
      - key: TMDB_API_KEY
        sync: false
    disk:
      name: streamx-data
      mountPath: /var/data/streamx
      sizeGB: 2

  - type: web
    name: streamx-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
