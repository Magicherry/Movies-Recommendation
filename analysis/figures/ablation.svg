<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc"><title>Signal versus noise ablation</title><desc>Signal versus noise ablation</desc><rect x="0" y="0" width="920" height="360" fill="#0f172a"/><text x="40" y="42" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif" font-weight="bold">Signal vs Noise Ablation</text><text x="40" y="70" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">Higher delta R² means the removed block carried more useful signal.</text><text x="160" y="105" text-anchor="end" fill="#e5e7eb" font-size="15" font-family="Arial, sans-serif">Content</text><rect x="180" y="86" width="650" height="24" fill="#111827" rx="6"/><rect x="180" y="86" width="650.0" height="24" fill="#22c55e" rx="6"/><text x="840.0" y="104" fill="#e5e7eb" font-size="13" font-family="Arial, sans-serif">0.0534</text><text x="160" y="175" text-anchor="end" fill="#e5e7eb" font-size="15" font-family="Arial, sans-serif">Engagement</text><rect x="180" y="156" width="650" height="24" fill="#111827" rx="6"/><rect x="180" y="156" width="367.2" height="24" fill="#22c55e" rx="6"/><text x="557.2" y="174" fill="#e5e7eb" font-size="13" font-family="Arial, sans-serif">0.0302</text><text x="160" y="245" text-anchor="end" fill="#e5e7eb" font-size="15" font-family="Arial, sans-serif">Noise</text><rect x="180" y="226" width="650" height="24" fill="#111827" rx="6"/><rect x="180" y="226" width="-0.8" height="24" fill="#ef4444" rx="6"/><text x="189.2" y="244" fill="#e5e7eb" font-size="13" font-family="Arial, sans-serif">-0.0001</text></svg>